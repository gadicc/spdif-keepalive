name: CI and Publish AUR

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to AUR after validation"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-aur-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.project.outputs.version }}
      tag: ${{ steps.project.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read project version
        id: project
        run: |
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "tag=v${version}" >>"${GITHUB_OUTPUT}"

      - name: Validate PKGBUILD version
        run: |
          source packaging/arch/PKGBUILD

          if [[ "${pkgver}" != "${{ steps.project.outputs.version }}" ]]; then
            echo "::error::PKGBUILD pkgver=${pkgver}, but pyproject.toml version=${{ steps.project.outputs.version }}"
            exit 1
          fi

      - name: Validate package module version
        run: |
          module_version="$(python3 -c 'import ast; tree = ast.parse(open("src/spdif_keepalive/__init__.py").read()); print(next(node.value.value for node in tree.body if isinstance(node, ast.Assign) and any(getattr(target, "id", None) == "__version__" for target in node.targets)))')"

          if [[ "${module_version}" != "${{ steps.project.outputs.version }}" ]]; then
            echo "::error::src/spdif_keepalive/__init__.py __version__=${module_version}, but pyproject.toml version=${{ steps.project.outputs.version }}"
            exit 1
          fi

      - name: Run Python checks
        run: |
          set -euo pipefail

          python3 -m pip install --user build pytest "setuptools>=77" wheel
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src pytest -q -p no:cacheprovider
          python3 -m compileall -q src
          python3 -m build --wheel --no-isolation --outdir /tmp/spdif-keepalive-dist

      - name: Check shell scripts
        run: |
          set -euo pipefail

          bash -n systemd/spdif-keepalive-sleep

      - name: Validate Arch package without release tag
        run: |
          set -euo pipefail

          host_uid="$(id -u)"
          host_gid="$(id -g)"

          docker run --rm \
            -e "HOST_UID=${host_uid}" \
            -e "HOST_GID=${host_gid}" \
            -e "PROJECT_VERSION=${{ steps.project.outputs.version }}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail

              pacman -Syu --noconfirm \
                git \
                libpulse \
                namcap \
                pipewire \
                python \
                python-build \
                python-installer \
                python-pytest \
                python-setuptools \
                python-wheel \
                systemd \
                util-linux

              if ! getent group "${HOST_GID}" >/dev/null; then
                groupadd -g "${HOST_GID}" builder
              fi

              useradd -m -u "${HOST_UID}" -g "${HOST_GID}" builder

              runuser -u builder -- bash /workspace/.github/scripts/validate-arch-package.sh
            '

  publish-aur:
    name: Publish AUR package
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.repository == 'gadicc/spdif-keepalive' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish)
      )

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag if needed
        run: |
          set -euo pipefail

          tag="${{ needs.validate.outputs.tag }}"
          git fetch --tags origin

          if git rev-parse --verify --quiet "${tag}" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "${tag}")"

            if [[ "${tagged_commit}" != "${GITHUB_SHA}" ]]; then
              echo "::error::${tag} already exists at ${tagged_commit}; bump pyproject.toml and PKGBUILD before publishing this commit."
              exit 1
            fi

            echo "${tag} already points at this commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "spdif-keepalive ${{ needs.validate.outputs.version }}" "${GITHUB_SHA}"
          git push origin "${tag}"

      - name: Build AUR package files from release tag
        run: |
          set -euo pipefail

          host_uid="$(id -u)"
          host_gid="$(id -g)"

          docker run --rm \
            -e "HOST_UID=${host_uid}" \
            -e "HOST_GID=${host_gid}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail

              pacman -Syu --noconfirm \
                git \
                libpulse \
                namcap \
                pacman-contrib \
                pipewire \
                python \
                python-build \
                python-installer \
                python-pytest \
                python-setuptools \
                python-wheel \
                systemd \
                util-linux

              if ! getent group "${HOST_GID}" >/dev/null; then
                groupadd -g "${HOST_GID}" builder
              fi

              useradd -m -u "${HOST_UID}" -g "${HOST_GID}" builder
              chown -R builder:"${HOST_GID}" /workspace/packaging/arch

              runuser -u builder -- bash /workspace/.github/scripts/build-release-aur-package.sh
            '

      - name: Check AUR SSH secret
        id: aur
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -n "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "configured=true" >>"${GITHUB_OUTPUT}"
          else
            echo "configured=false" >>"${GITHUB_OUTPUT}"
            echo "::warning::AUR_SSH_PRIVATE_KEY is not configured; generated AUR files, but skipped publishing."
          fi

      - name: Configure AUR SSH
        if: steps.aur.outputs.configured == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" >"${HOME}/.ssh/aur"
          chmod 600 "${HOME}/.ssh/aur"
          ssh-keyscan aur.archlinux.org >>"${HOME}/.ssh/known_hosts"

          {
            echo "Host aur.archlinux.org"
            echo "  HostName aur.archlinux.org"
            echo "  User aur"
            echo "  IdentityFile ~/.ssh/aur"
            echo "  IdentitiesOnly yes"
          } >"${HOME}/.ssh/config"

      - name: Publish to AUR
        if: steps.aur.outputs.configured == 'true'
        run: |
          set -euo pipefail

          aur_url="ssh://aur@aur.archlinux.org/spdif-keepalive.git"

          if git clone "${aur_url}" aur-package; then
            echo "Cloned existing AUR package repository."
          else
            echo "AUR package repository is not cloneable yet; preparing initial package push."
            rm -rf aur-package
            mkdir aur-package
            git -C aur-package init --initial-branch=master
            git -C aur-package remote add origin "${aur_url}"
          fi

          cp packaging/arch/PKGBUILD aur-package/PKGBUILD
          cp packaging/arch/.SRCINFO aur-package/.SRCINFO
          cp packaging/arch/LICENSE aur-package/LICENSE
          cp packaging/arch/spdif-keepalive.install aur-package/spdif-keepalive.install

          cd aur-package
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO LICENSE spdif-keepalive.install

          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          git commit -m "Update to ${{ needs.validate.outputs.version }}"
          git push origin HEAD:master
